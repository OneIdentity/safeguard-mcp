trigger:
  branches:
    include:
      - main
  tags:
    include:
      - 'v*'

pr:
  branches:
    include:
      - main

variables:
  - template: pipeline-templates/global-variables.yml

jobs:
  # ──────────────────────────────────────────────────────────────
  # PR Validation: build + unit test only
  # ──────────────────────────────────────────────────────────────
  - job: PRValidation
    displayName: 'PR Validation'
    condition: eq(variables['Build.Reason'], 'PullRequest')
    pool:
      vmImage: 'ubuntu-latest'
    steps:
      - template: pipeline-templates/build-steps.yml

  # ──────────────────────────────────────────────────────────────
  # Deployment-manifest validation. Runs on every build (PR or
  # otherwise) — fast, no toolchain dependencies beyond helm and
  # kubeconform. Catches:
  #   * Schema regressions in the plain k8s manifests
  #     (`kubeconform -strict`, offline JSON-schema validation).
  #   * Helm chart issues (`helm lint`).
  #   * Unintended drift in the rendered chart output, by diffing
  #     a fresh render against the checked-in golden file at
  #     deploy/helm/safeguard-mcp/golden/manifests.yaml.
  # If you intentionally change a template, regenerate the golden
  # via the render.sh script in that directory and commit it
  # alongside the template change.
  # ──────────────────────────────────────────────────────────────
  - job: ValidateDeploy
    displayName: 'Validate deploy/ manifests'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
      - task: HelmInstaller@1
        displayName: 'Install helm'
        inputs:
          helmVersionToInstall: 'v3.16.3'

      - script: |
          set -euo pipefail
          KUBECONFORM_VERSION=v0.6.7
          curl -sSL -o /tmp/kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          sudo install -m 0755 /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v
        displayName: 'Install kubeconform'

      - script: |
          set -euo pipefail
          # Offline schema validation against the Kubernetes JSON schemas.
          # `kubectl apply --dry-run=client` needs a live API server for
          # discovery/OpenAPI, which hosted agents do not have; kubeconform
          # validates without a cluster.
          kubeconform -strict -summary -verbose deploy/k8s/
        displayName: 'kubeconform validate deploy/k8s/'

      - script: |
          set -euo pipefail
          helm lint deploy/helm/safeguard-mcp \
            --set safeguardHost=safeguard.example.com \
            --set mcpPublicUrl=https://mcp.example.com \
            --set rstsClientId=https://mcp.example.com \
            --set ingress.host=mcp.example.com
        displayName: 'helm lint deploy/helm/safeguard-mcp'

      - script: |
          set -euo pipefail
          # Render with the same fixed values used to produce the
          # checked-in golden, then diff. A non-empty diff fails
          # the job; the diff itself is printed for the reviewer.
          fresh=$(mktemp)
          deploy/helm/safeguard-mcp/golden/render.sh > "$fresh"
          if ! diff -u deploy/helm/safeguard-mcp/golden/manifests.yaml "$fresh"; then
            echo ""
            echo "ERROR: Helm template render no longer matches golden."
            echo "If this change is intentional, regenerate via:"
            echo "  deploy/helm/safeguard-mcp/golden/render.sh > deploy/helm/safeguard-mcp/golden/manifests.yaml"
            echo "and commit the result alongside your template changes."
            exit 1
          fi
        displayName: 'helm template == golden (drift check)'

      - script: |
          set -euo pipefail
          # Render the golden once more and pipe it through the same
          # offline schema validator we ran against deploy/k8s/.
          deploy/helm/safeguard-mcp/golden/render.sh \
            | kubeconform -strict -summary -
        displayName: 'kubeconform validate rendered chart'

  # ──────────────────────────────────────────────────────────────
  # Per-RID AOT publish jobs (non-PR builds)
  # Native AOT cannot cross-compile across operating systems,
  # so each RID is built on its own pool.
  # ──────────────────────────────────────────────────────────────
  - job: Publish_linux_x64
    displayName: 'Publish linux-x64 (AOT)'
    condition: ne(variables['Build.Reason'], 'PullRequest')
    pool:
      vmImage: 'ubuntu-latest'
    steps:
      - script: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang zlib1g-dev
        displayName: 'Install Native AOT toolchain'

      - template: pipeline-templates/build-steps.yml

      - script: |
          dotnet publish src/SafeguardMcp/SafeguardMcp.csproj \
            -c Release -r linux-x64 -p:PublishAot=true \
            -o $(Build.ArtifactStagingDirectory)/linux-x64
        displayName: 'AOT publish linux-x64'

      - script: |
          set -euo pipefail
          STAGE="$(Build.ArtifactStagingDirectory)/linux-x64"
          chmod +x "$STAGE/SafeguardMcp"

          # Drive the published binary over stdio with initialize + tools/list.
          # The stdio transport ties its output writer to stdin lifetime, so a
          # plain `printf | binary` closes stdin and races the server into
          # shutdown before it flushes responses (stdout comes back empty). The
          # trailing `sleep` keeps stdin open long enough for stdout to flush.
          # Allowed exit codes: 0 (clean EOF) or 124 (timeout fired after we
          # already got the responses we need).
          set +e
          SMOKE_OUT=$( { printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"smoke","version":"0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}'; sleep 3; } \
            | timeout 10s "$STAGE/SafeguardMcp")
          RC=$?
          set -e

          echo "--- smoke stdout ---"
          echo "$SMOKE_OUT"
          echo "--- exit code: $RC ---"

          if [ "$RC" -ne 0 ] && [ "$RC" -ne 124 ]; then
            echo "ERROR: binary exited with unexpected code $RC"
            exit 1
          fi

          # Extract the tool names from the tools/list response (id == 2).
          # Each stdout line should be a valid JSON-RPC message; jq filters by id.
          ACTUAL=$(echo "$SMOKE_OUT" | jq -r 'select(.id==2) | .result.tools[].name' | sort -u)
          EXPECTED=$(printf '%s\n' \
            Safeguard_Connect \
            Safeguard_Disconnect \
            Safeguard_Discover \
            Safeguard_Execute \
            Safeguard_Reference \
            Safeguard_Schema \
            Safeguard_OpenAccessRequest \
            Safeguard_CloseAccessRequest \
            Safeguard_RetrieveCredential | sort -u)

          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "ERROR: tools/list did not return the expected set."
            echo "--- expected ---"; echo "$EXPECTED"
            echo "--- actual ---";   echo "$ACTUAL"
            exit 1
          fi

          echo "Smoke OK: all 9 expected tools present (exact match)."
        displayName: 'Smoke: stdio tools/list returns expected tools'

      - task: PublishPipelineArtifact@1
        displayName: 'Publish linux-x64 artifact'
        inputs:
          targetPath: $(Build.ArtifactStagingDirectory)/linux-x64
          artifactName: 'publish-linux-x64'

  - job: Publish_win_x64
    displayName: 'Publish win-x64 (AOT)'
    condition: ne(variables['Build.Reason'], 'PullRequest')
    pool:
      vmImage: 'windows-latest'
    steps:
      - template: pipeline-templates/build-steps.yml

      - script: |
          dotnet publish src/SafeguardMcp/SafeguardMcp.csproj -c Release -r win-x64 -p:PublishAot=true -o $(Build.ArtifactStagingDirectory)/win-x64
        displayName: 'AOT publish win-x64'

      # ──────────────────────────────────────────────────────────────
      # Authenticode-sign SafeguardMcp.exe via SSL.com eSigner CKA.
      # Recipe mirrors OneIdentity/SCALUS azure-pipelines.yml. All
      # secret-touching steps gated on isRelease so PRs (incl. forks)
      # never pull SPPCodeSigning vault contents.
      # ──────────────────────────────────────────────────────────────
      - task: AzureKeyVault@2
        displayName: 'Get SPPCodeSigning secrets from Azure Key Vault'
        inputs:
          ConnectedServiceName: 'OneIdentity.Infrastructure.SPPCodeSigning'
          KeyVaultName: 'SPPCodeSigning'
          SecretsFilter: 'SPPCodeSigning-Password,SPPCodeSigning-TotpPrivateKey'
        condition: and(succeeded(), eq(variables.isRelease, true))

      - powershell: |
          # Download and unzip the latest eSigner CKA setup, then
          # rename the versioned exe to a stable filename.
          Invoke-WebRequest -OutFile eSigner_CKA_Setup.zip "https://www.ssl.com/download/ssl-com-esigner-cka"
          Expand-Archive -Force eSigner_CKA_Setup.zip
          Remove-Item eSigner_CKA_Setup.zip
          Move-Item -Path "eSigner_CKA_*\*.exe" -Destination "eSigner_CKA_Installer.exe"
        displayName: 'Download and unzip eSigner CKA setup'
        condition: and(succeeded(), eq(variables.isRelease, true))

      - powershell: |
          .\eSigner_CKA_Installer.exe /CURRENTUSER /VERYSILENT /SUPPRESSMSGBOXES /DIR="$(Build.SourcesDirectory)\eSignerCKA" | Out-Null
          Get-ChildItem "$(Build.SourcesDirectory)\eSignerCKA"
        displayName: 'Install eSigner CKA silently'
        condition: and(succeeded(), eq(variables.isRelease, true))

      - powershell: |
          & "$(Build.SourcesDirectory)\eSignerCKA\eSignerCKATool.exe" config `
            -mode "product" `
            -user "ssl.oid.safeguardpp@groups.quest.com" `
            -pass "$(SPPCodeSigning-Password)" `
            -totp "$(SPPCodeSigning-TotpPrivateKey)" `
            -key "$(Build.SourcesDirectory)\eSignerCKA\master.key" `
            -r
        displayName: 'Configure eSigner CKA with vault credentials'
        condition: and(succeeded(), eq(variables.isRelease, true))

      - powershell: |
          & "$(Build.SourcesDirectory)\eSignerCKA\eSignerCKATool.exe" unload
          & "$(Build.SourcesDirectory)\eSignerCKA\eSignerCKATool.exe" load
        displayName: 'Load eSigner CKA certificate into Windows cert store'
        condition: and(succeeded(), eq(variables.isRelease, true))

      - powershell: |
          $ErrorActionPreference = "Stop"
          $exe = "$(Build.ArtifactStagingDirectory)\win-x64\SafeguardMcp.exe"
          if (-not (Test-Path $exe)) {
            Write-Host "Contents of $(Build.ArtifactStagingDirectory)\win-x64:"
            Get-ChildItem "$(Build.ArtifactStagingDirectory)\win-x64" -Recurse | ForEach-Object { Write-Host $_.FullName }
            throw "Expected AOT executable not found: $exe"
          }
          # Look up the eSignerCKA cert thumbprint and match it with /sha1.
          # Subject matching (/n) is unreliable; thumbprint is exact.
          $CodeSigningCert = Get-ChildItem Cert:\CurrentUser\My -CodeSigningCert | Select-Object -First 1
          if (-not $CodeSigningCert) {
            throw "No code signing certificate found in CurrentUser\My store"
          }
          Write-Host "Found code signing certificate:"
          Write-Host "  Subject: $($CodeSigningCert.Subject)"
          Write-Host "  Thumbprint: $($CodeSigningCert.Thumbprint)"
          Write-Host "  Expires: $($CodeSigningCert.NotAfter)"
          # Use the x86 Windows SDK signtool: eSignerCKA's PKCS#11 DLL is
          # 32-bit only, so the x64 signtool cannot load the private key
          # ("0 certs left after Private Key filter"). See safeguard-ps /
          # SafeguardDotNet pipelines for the same workaround.
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "\\x86\\" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) {
            throw "x86 signtool.exe not found under Windows SDK install path."
          }
          Write-Host "Using signtool: $signtool"
          & $signtool sign /debug /fd sha256 /tr http://ts.ssl.com /td sha256 /sha1 $CodeSigningCert.Thumbprint "$exe"
          if ($LASTEXITCODE -ne 0) { throw "signtool sign failed with exit code $LASTEXITCODE" }
          $verify = Get-AuthenticodeSignature -FilePath $exe
          Write-Host "Verification status: $($verify.Status)"
          if ($verify.Status -ne "Valid") {
            throw "Signature verification failed with status '$($verify.Status)': $($verify.StatusMessage)"
          }
          Write-Host "Executable signed and verified successfully"
        displayName: 'Authenticode-sign and verify SafeguardMcp.exe'
        condition: and(succeeded(), eq(variables.isRelease, true))

      - powershell: |
          # Best-effort hygiene: unload the cert from the user store and
          # delete the CKA workspace install + master.key. The hosted
          # agent is ephemeral, but explicit cleanup is cheap insurance.
          $cka = "$(Build.SourcesDirectory)\eSignerCKA\eSignerCKATool.exe"
          if (Test-Path $cka) {
            & $cka unload
          }
          Remove-Item -Recurse -Force "$(Build.SourcesDirectory)\eSignerCKA" -ErrorAction SilentlyContinue
          Remove-Item -Force "eSigner_CKA_Installer.exe" -ErrorAction SilentlyContinue
        displayName: 'Clean up eSigner CKA state'
        condition: and(always(), eq(variables.isRelease, true))

      - task: PublishPipelineArtifact@1
        displayName: 'Publish win-x64 artifact'
        inputs:
          targetPath: $(Build.ArtifactStagingDirectory)/win-x64
          artifactName: 'publish-win-x64'

  - job: Publish_osx_arm64
    displayName: 'Publish osx-arm64 (AOT)'
    condition: ne(variables['Build.Reason'], 'PullRequest')
    pool:
      vmImage: 'macOS-latest'
    steps:
      - template: pipeline-templates/build-steps.yml

      - script: |
          dotnet publish src/SafeguardMcp/SafeguardMcp.csproj \
            -c Release -r osx-arm64 -p:PublishAot=true \
            -o $(Build.ArtifactStagingDirectory)/osx-arm64
        displayName: 'AOT publish osx-arm64'

      # ──────────────────────────────────────────────────────────────
      # Apple codesign + notarize the raw Mach-O `SafeguardMcp` binary.
      # Brief item 25; SCALUS recipe adapted (raw Mach-O, no .pkg, no
      # stapling — Gatekeeper validates online via quarantine xattr).
      # All secret-touching steps gated on isRelease.
      # ──────────────────────────────────────────────────────────────
      - task: AzureKeyVault@2
        displayName: 'Get Apple signing secrets from Azure Key Vault'
        inputs:
          ConnectedServiceName: 'OneIdentity.Infrastructure.SPPCodeSigning'
          KeyVaultName: 'SPPCodeSigning'
          SecretsFilter: 'AppleCertificate-Application-Cert,AppleCertificate-Installer-Password,Apple-App-Specific-Password'
        condition: and(succeeded(), eq(variables.isRelease, true))

      - powershell: |
          # The Apple Application cert is stored in Key Vault as a
          # password-less PKCS#12. macOS `security import` cannot consume
          # it directly, so re-protect it with the Installer password via
          # .NET before importing (mirrors the SCALUS pipeline).
          $kvSecretBytes = [System.Convert]::FromBase64String("$(AppleCertificate-Application-Cert)")
          $certCollection = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2Collection
          $certCollection.Import($kvSecretBytes, $null, [System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]::Exportable)
          $protectedCertificateBytes = $certCollection.Export([System.Security.Cryptography.X509Certificates.X509ContentType]::Pkcs12, "$(AppleCertificate-Installer-Password)")
          $certPath = "$(Agent.TempDirectory)/AppleCertificate-Application.p12"
          [System.IO.File]::WriteAllBytes($certPath, $protectedCertificateBytes)
          Write-Host "Re-protected Apple cert written to $certPath"
        displayName: 'Re-protect Apple cert for keychain import'
        condition: and(succeeded(), eq(variables.isRelease, true))

      - bash: |
          set -euo pipefail
          # Isolate the signing identity in a temporary keychain so we
          # never touch System.keychain on the hosted agent.
          KEYCHAIN_PATH="$(Agent.TempDirectory)/safeguard-mcp-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          CERT_PATH="$(Agent.TempDirectory)/AppleCertificate-Application.p12"

          echo "##vso[task.setvariable variable=KEYCHAIN_PATH;issecret=false]$KEYCHAIN_PATH"
          echo "##vso[task.setvariable variable=KEYCHAIN_PASSWORD;issecret=true]$KEYCHAIN_PASSWORD"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Prepend the temp keychain to the user search list so codesign
          # can find the identity without touching the login keychain.
          ORIGINAL_LIST=$(security list-keychains -d user | sed -e 's/[\"]//g' | tr -d '\n ')
          security list-keychains -d user -s "$KEYCHAIN_PATH" $ORIGINAL_LIST

          # The re-protected PKCS#12 was written by the previous step.
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$(AppleCertificate-Installer-Password)" \
            -A -t cert -f pkcs12 \
            -T /usr/bin/codesign -T /usr/bin/security

          # Allow codesign to use the private key non-interactively.
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          rm -f "$CERT_PATH"

          # Locate the Developer ID Application identity from this team.
          # Fail loudly if zero or multiple match.
          IDENTITY_LINE=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep '"Developer ID Application:' | grep '(LDBTVAT43D)' || true)
          if [ -z "$IDENTITY_LINE" ]; then
            echo "No Developer ID Application identity for team LDBTVAT43D found." >&2
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" >&2 || true
            exit 1
          fi
          if [ "$(echo "$IDENTITY_LINE" | wc -l)" -ne 1 ]; then
            echo "Multiple Developer ID Application identities matched; refusing to guess." >&2
            echo "$IDENTITY_LINE" >&2
            exit 1
          fi
          IDENTITY_SHA1=$(echo "$IDENTITY_LINE" | awk '{print $2}')
          echo "Using signing identity SHA-1: $IDENTITY_SHA1"
          echo "##vso[task.setvariable variable=APPLE_SIGNING_IDENTITY;issecret=false]$IDENTITY_SHA1"
        displayName: 'Set up temporary keychain and import Apple cert'
        condition: and(succeeded(), eq(variables.isRelease, true))

      - bash: |
          set -euo pipefail
          BIN="$(Build.ArtifactStagingDirectory)/osx-arm64/SafeguardMcp"
          if [ ! -f "$BIN" ]; then
            ls -la "$(Build.ArtifactStagingDirectory)/osx-arm64" || true
            echo "Expected AOT executable not found: $BIN" >&2
            exit 1
          fi
          # Diagnostic: warn if any non-system dylib is linked. AOT
          # output should depend only on /usr/lib + /System/Library; if
          # bundled dylibs ever appear, they must be signed first.
          echo "otool -L:"
          otool -L "$BIN"

          # Hardened runtime + secure timestamp are required by the
          # Apple Notary Service. No entitlements: AOT does not JIT.
          codesign --force --options runtime --timestamp \
            --sign "$(APPLE_SIGNING_IDENTITY)" \
            --keychain "$(KEYCHAIN_PATH)" \
            "$BIN"

          codesign --verify --deep --strict --verbose=2 "$BIN"
          codesign --display --verbose=4 "$BIN"
        displayName: 'codesign and verify SafeguardMcp (osx-arm64)'
        condition: and(succeeded(), eq(variables.isRelease, true))

      - bash: |
          set -euo pipefail
          BIN="$(Build.ArtifactStagingDirectory)/osx-arm64/SafeguardMcp"
          ZIP="$(Agent.TempDirectory)/SafeguardMcp-osx-arm64.zip"
          # Apple notary service requires zip/pkg/dmg as the upload
          # vehicle. ditto preserves macOS metadata better than zip(1).
          ditto -c -k --keepParent "$BIN" "$ZIP"

          # Submit and wait. JSON output is machine-readable so we can
          # capture the submission id reliably for diagnostics.
          set +e
          NOTARY_OUT=$(xcrun notarytool submit "$ZIP" \
            --apple-id "One.Identity.Apple.Developer@oneidentity.com" \
            --password "$(Apple-App-Specific-Password)" \
            --team-id "LDBTVAT43D" \
            --wait \
            --output-format json)
          NOTARY_RC=$?
          set -e
          echo "$NOTARY_OUT"

          STATUS=$(echo "$NOTARY_OUT" | python3 -c 'import json,sys;print(json.load(sys.stdin).get("status",""))' || true)
          SUBMISSION_ID=$(echo "$NOTARY_OUT" | python3 -c 'import json,sys;print(json.load(sys.stdin).get("id",""))' || true)

          if [ "$NOTARY_RC" -ne 0 ] || [ "$STATUS" != "Accepted" ]; then
            echo "Notarization failed (rc=$NOTARY_RC, status=$STATUS)." >&2
            if [ -n "$SUBMISSION_ID" ]; then
              echo "Fetching notary log for $SUBMISSION_ID..." >&2
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "One.Identity.Apple.Developer@oneidentity.com" \
                --password "$(Apple-App-Specific-Password)" \
                --team-id "LDBTVAT43D" || true
            fi
            exit 1
          fi

          # Stapling is N/A for raw Mach-O. Gatekeeper validates online
          # via the quarantine xattr at first launch on the user's
          # machine. Do not staple; do not gate on `spctl -t install`.
          rm -f "$ZIP"
        displayName: 'Notarize SafeguardMcp via xcrun notarytool'
        condition: and(succeeded(), eq(variables.isRelease, true))

      - bash: |
          set -eu
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
        displayName: 'Clean up temporary signing keychain'
        condition: and(always(), eq(variables.isRelease, true))

      - task: PublishPipelineArtifact@1
        displayName: 'Publish osx-arm64 artifact'
        inputs:
          targetPath: $(Build.ArtifactStagingDirectory)/osx-arm64
          artifactName: 'publish-osx-arm64'

  # ──────────────────────────────────────────────────────────────
  # Release: aggregate artifacts, publish npm + Docker, GitHub release
  # ──────────────────────────────────────────────────────────────
  - job: Release
    displayName: 'Release'
    dependsOn:
      - Publish_linux_x64
      - Publish_win_x64
      - Publish_osx_arm64
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    pool:
      vmImage: 'ubuntu-latest'
    steps:
      - checkout: self

      # Version stamping (sets $(PackageVersion), $(IsPreRelease), $(ReleaseTag))
      - task: PowerShell@2
        displayName: 'Set package version'
        inputs:
          filePath: 'pipeline-templates/versionnumber.ps1'
          arguments: >
            -BuildId $(Build.BuildId)
            -TagName $(Build.SourceBranchName)
            -IsTagBuild $(isTagBuild)
            -SemanticVersion $(semanticVersion)

      # Pull per-RID AOT publish outputs back into ArtifactStagingDirectory
      - task: DownloadPipelineArtifact@2
        displayName: 'Download linux-x64 artifact'
        inputs:
          artifact: 'publish-linux-x64'
          path: $(Build.ArtifactStagingDirectory)/linux-x64

      - task: DownloadPipelineArtifact@2
        displayName: 'Download win-x64 artifact'
        inputs:
          artifact: 'publish-win-x64'
          path: $(Build.ArtifactStagingDirectory)/win-x64

      - task: DownloadPipelineArtifact@2
        displayName: 'Download osx-arm64 artifact'
        inputs:
          artifact: 'publish-osx-arm64'
          path: $(Build.ArtifactStagingDirectory)/osx-arm64

      # Restore executable bit (PublishPipelineArtifact does not preserve it)
      - script: |
          chmod +x $(Build.ArtifactStagingDirectory)/linux-x64/SafeguardMcp
          chmod +x $(Build.ArtifactStagingDirectory)/osx-arm64/SafeguardMcp
        displayName: 'Restore executable bit on Linux/macOS binaries'

      # Stage binaries into npm platform packages
      - script: |
          cp $(Build.ArtifactStagingDirectory)/linux-x64/SafeguardMcp npm/safeguard-mcp-linux-x64/safeguard-mcp
          cp $(Build.ArtifactStagingDirectory)/win-x64/SafeguardMcp.exe npm/safeguard-mcp-win-x64/safeguard-mcp.exe
          cp $(Build.ArtifactStagingDirectory)/osx-arm64/SafeguardMcp npm/safeguard-mcp-darwin-arm64/safeguard-mcp
          chmod +x npm/safeguard-mcp-linux-x64/safeguard-mcp
          chmod +x npm/safeguard-mcp-darwin-arm64/safeguard-mcp
        displayName: 'Stage binaries into npm packages'

      # Smoke: pack all 5 npm packages, install the linux-x64 platform
      # tarball + root tarball globally on this agent, and run
      # `safeguard-mcp --version` to prove the wrapper's optional-dep
      # resolution actually launches the AOT binary. Catches launcher
      # regressions before we publish anything.
      - script: |
          set -euo pipefail
          PACKDIR=$(mktemp -d)
          for pkg in safeguard-mcp-linux-x64 \
                     safeguard-mcp-win-x64 safeguard-mcp-darwin-arm64 \
                     safeguard-mcp; do
            (cd "npm/$pkg" && npm pack --pack-destination="$PACKDIR")
          done
          ls -la "$PACKDIR"

          PLATFORM_TGZ=$(ls "$PACKDIR"/oneidentity-safeguard-mcp-linux-x64-*.tgz)
          ROOT_TGZ=$(ls "$PACKDIR"/oneidentity-safeguard-mcp-[0-9]*.tgz)

          echo "Installing platform tarball globally: $PLATFORM_TGZ"
          npm install -g --no-package-lock "$PLATFORM_TGZ"

          echo "Installing root tarball globally (omit optional deps): $ROOT_TGZ"
          npm install -g --omit=optional --no-package-lock "$ROOT_TGZ"

          echo "Running safeguard-mcp --version..."
          OUT=$(safeguard-mcp --version)
          echo "$OUT"
          if ! echo "$OUT" | grep -Eq '[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "ERROR: --version output did not contain a semver."
            exit 1
          fi
          echo "Smoke OK: npm wrapper launches platform binary."
        displayName: 'Smoke: npm pack + global install + --version'

      # Retrieve npm token from Key Vault. Tag-only: publishing happens only
      # on refs/tags/v*, so non-tag builds never even fetch the token.
      - task: AzureKeyVault@2
        displayName: 'Get npm publish token'
        condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))
        inputs:
          azureSubscription: 'SafeguardOpenSource'
          KeyVaultName: 'SafeguardBuildSecrets'
          SecretsFilter: 'NpmOrgApiKey'

      # Publish npm packages. Tag-only: only refs/tags/v* publishes.
      - script: |
          npm config set //registry.npmjs.org/:_authToken=$(NpmOrgApiKey)

          # Publish platform packages first
          cd npm/safeguard-mcp-linux-x64 && npm publish --access public && cd ../..
          cd npm/safeguard-mcp-win-x64 && npm publish --access public && cd ../..
          cd npm/safeguard-mcp-darwin-arm64 && npm publish --access public && cd ../..

          # Publish root package
          cd npm/safeguard-mcp && npm publish --access public && cd ../..
        displayName: 'npm publish (release)'
        # Tag-only: a non-tag main build must never push to npm. Only
        # refs/tags/v* publishes, selecting the release dist-tag.
        condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))

      # Build & push the Docker image (linux/amd64) via buildx. The
      # Dockerfile consumes the pre-built AOT binary from the per-RID
      # publish job above (see Publish_linux_x64) — no in-image
      # `dotnet publish`, no QEMU.
      - task: AzureKeyVault@2
        displayName: 'Get GHCR token'
        # Tag-only: only a refs/tags/v* build pushes to GHCR, so non-tag
        # builds neither fetch the token nor log in.
        condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))
        inputs:
          azureSubscription: 'SafeguardOpenSource'
          KeyVaultName: 'SafeguardBuildSecrets'
          SecretsFilter: 'GitHubContainerRegistryToken'

      - script: |
          set -euo pipefail
          mkdir -p binaries/amd64
          cp $(Build.ArtifactStagingDirectory)/linux-x64/SafeguardMcp binaries/amd64/SafeguardMcp
          chmod +x binaries/amd64/SafeguardMcp
        displayName: 'Stage AOT binaries for buildx'

      - script: |
          set -euo pipefail
          echo $(GitHubContainerRegistryToken) | docker login ghcr.io -u OneIdentity --password-stdin
          docker buildx create --name multiarch --use 2>/dev/null || docker buildx use multiarch
          docker buildx inspect --bootstrap
        displayName: 'Set up buildx multi-arch builder'
        # Tag-only: the multi-arch builder + GHCR login are only needed for
        # the release push. The smoke build below uses the default builder.
        condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))

      # Smoke: build a single-arch image with the default (docker) builder
      # so we can --load it locally, run it with the default --http
      # ENTRYPOINT, and exercise the streamable-HTTP /mcp endpoint with a
      # real JSON-RPC initialize before we push anything to GHCR.
      - script: |
          set -euo pipefail
          docker buildx build \
            --builder default \
            --platform linux/amd64 \
            --load \
            --tag safeguard-mcp:smoke \
            --build-arg IMAGE_VERSION=smoke \
            .

          CID=$(docker run -d --rm -p 18080:8080 safeguard-mcp:smoke)
          trap 'echo "--- container logs ---"; docker logs "$CID" || true; docker rm -f "$CID" >/dev/null 2>&1 || true' EXIT

          OK=0
          for i in $(seq 1 30); do
            RESP=$(curl -fsS \
              -X POST \
              -H 'Content-Type: application/json' \
              -H 'Accept: application/json, text/event-stream' \
              -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"smoke","version":"0"}}}' \
              http://localhost:18080/mcp 2>/dev/null) || RESP=""
            if echo "$RESP" | grep -q '"jsonrpc"'; then
              echo "--- /mcp response ---"
              echo "$RESP"
              OK=1
              break
            fi
            sleep 1
          done

          if [ "$OK" -ne 1 ]; then
            echo "ERROR: /mcp did not respond with a JSON-RPC body in 30s"
            exit 1
          fi
          echo "Smoke OK: HTTP /mcp accepted initialize."
        displayName: 'Smoke: docker --http /mcp accepts initialize'

      # Budget guardrail: the chiseled-base image plus a single AOT binary
      # should fit comfortably under 80 MB uncompressed. If it doesn't, we
      # have either accidentally pulled in a heavier base, dropped trim,
      # or grown the binary unexpectedly — fail before we publish.
      - script: |
          set -euo pipefail
          SIZE=$(docker image inspect safeguard-mcp:smoke --format '{{.Size}}')
          LIMIT=$((80 * 1024 * 1024))
          echo "Image size: $SIZE bytes (budget: $LIMIT bytes / 80 MB)"
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "ERROR: docker image exceeds 80 MB budget."
            exit 1
          fi
        displayName: 'Smoke: docker image under 80 MB budget'

      # Tag build: push :version and :latest in one shot.
      - script: |
          set -euo pipefail
          docker buildx build \
            --platform linux/amd64 \
            --tag $(containerRegistry)/$(imageName):$(PackageVersion) \
            --tag $(containerRegistry)/$(imageName):latest \
            --build-arg IMAGE_VERSION=$(PackageVersion) \
            --provenance=mode=max \
            --sbom=true \
            --metadata-file $(Build.ArtifactStagingDirectory)/docker-image-metadata.json \
            --push .
          docker buildx imagetools inspect $(containerRegistry)/$(imageName):$(PackageVersion)
        displayName: 'buildx build & push (release)'
        # Tag-only: only a refs/tags/v* build pushes an image to GHCR.
        condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))

      # Publish the buildx metadata (containing the manifest-list digest)
      # so the cosign sign step below can sign the immutable digest.
      - task: PublishPipelineArtifact@1
        displayName: 'Publish docker image metadata'
        inputs:
          targetPath: $(Build.ArtifactStagingDirectory)/docker-image-metadata.json
          artifactName: 'docker-image-metadata'
        condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))

      # ──────────────────────────────────────────────────────────────
      # Item 27: cosign sign the multi-arch manifest list and extract
      # per-platform SBOMs as GitHub Release assets. Signing key is an
      # Azure Key Vault HSM key (`safeguard-mcp-cosign`) in
      # SPPCodeSigning; private bytes never leave the vault. Auth is
      # via the existing ADO service connection
      # `OneIdentity.Infrastructure.SPPCodeSigning` — cosign's default
      # Azure credential chain picks up the AzureCLI session.
      # ──────────────────────────────────────────────────────────────
      - script: |
          set -euo pipefail
          COSIGN_VERSION=v2.4.1
          COSIGN_SHA256=8b24b946dd5809c6bd93de08033bcf6bc0ed7d336b7785787c080f574b89249b
          curl -sSL -o /tmp/cosign \
            "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64"
          echo "${COSIGN_SHA256}  /tmp/cosign" | sha256sum -c -
          sudo install -m 0755 /tmp/cosign /usr/local/bin/cosign
          cosign version
        displayName: 'Install pinned cosign'
        condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))

      - task: AzureCLI@2
        displayName: 'cosign sign manifest list (Azure Key Vault key)'
        condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))
        inputs:
          azureSubscription: 'OneIdentity.Infrastructure.SPPCodeSigning'
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail
            META="$(Build.ArtifactStagingDirectory)/docker-image-metadata.json"
            DIGEST=$(jq -er '."containerimage.digest"' "$META")
            case "$DIGEST" in
              sha256:*) ;;
              *) echo "Invalid manifest-list digest from buildx metadata: $DIGEST" >&2; exit 1 ;;
            esac
            IMAGE="$(containerRegistry)/$(imageName)@$DIGEST"
            echo "Signing immutable digest: $IMAGE"

            KEY_REF="azurekms://SPPCodeSigning.vault.azure.net/safeguard-mcp-cosign"
            export COSIGN_YES=true

            cosign sign --key "$KEY_REF" "$IMAGE"
            cosign verify --key "$KEY_REF" "$IMAGE"

            mkdir -p "$(Build.ArtifactStagingDirectory)/release"
            # Export the public half so users can verify with
            # `cosign verify --key cosign.pub <image>`. Until a static
            # cosign.pub is committed to the repo, this Release-asset
            # copy is the primary distribution channel; after commit,
            # this file should match `docs/cosign.pub` in the repo.
            cosign public-key --key "$KEY_REF" \
              > "$(Build.ArtifactStagingDirectory)/release/cosign.pub"
            cat "$(Build.ArtifactStagingDirectory)/release/cosign.pub"

      - script: |
          set -euo pipefail
          IMAGE="$(containerRegistry)/$(imageName):$(PackageVersion)"
          OUT="$(Build.ArtifactStagingDirectory)/release"
          mkdir -p "$OUT"
          # Extract per-platform SPDX SBOMs that buildx attached via
          # --sbom=true. `imagetools inspect` reads the in-toto
          # attestation envelope and returns the embedded SPDX doc.
          for platform in linux/amd64; do
            slug=$(echo "$platform" | tr '/' '-')
            docker buildx imagetools inspect "$IMAGE" \
              --format "{{ json (index .SBOM \"${platform}\").SPDX }}" \
              | jq . > "$OUT/sbom-${slug}.spdx.json"
            test -s "$OUT/sbom-${slug}.spdx.json"
            echo "Wrote $OUT/sbom-${slug}.spdx.json ($(wc -c < "$OUT/sbom-${slug}.spdx.json") bytes)"
          done
        displayName: 'Extract per-platform SBOMs from pushed image'
        condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))

      # Stage release artifacts
      - task: CopyFiles@2
        displayName: 'Stage release artifacts'
        inputs:
          sourceFolder: $(Build.ArtifactStagingDirectory)
          contents: |
            linux-x64/SafeguardMcp
            win-x64/SafeguardMcp.exe
            osx-arm64/SafeguardMcp
          targetFolder: $(Build.ArtifactStagingDirectory)/release

      - script: |
          cd $(Build.ArtifactStagingDirectory)
          tar -czf release/safeguard-mcp-linux-x64.tar.gz -C linux-x64 SafeguardMcp
          zip -j release/safeguard-mcp-win-x64.zip win-x64/SafeguardMcp.exe
          tar -czf release/safeguard-mcp-darwin-arm64.tar.gz -C osx-arm64 SafeguardMcp
        displayName: 'Archive release binaries'

      # SHA256SUMS over all release archives + SBOMs + cosign.pub
      # (item 26). Detached PGP signature (.asc) is intentionally
      # omitted for now: a release PGP key has not been provisioned in
      # SPPCodeSigning. README's "Verifying downloads" section should
      # reference `sha256sum -c` (and `cosign verify --key cosign.pub`
      # for the image) until a key is added or `cosign sign-blob`
      # replaces PGP for the SHA256SUMS file itself.
      - script: |
          set -euo pipefail
          cd $(Build.ArtifactStagingDirectory)/release
          # Sort for reproducibility; relative filenames so end users
          # can `sha256sum -c SHA256SUMS` from the download directory.
          # SBOMs and cosign.pub are only present on tag (release) builds;
          # use shell glob expansion plus `ls` so the step does not
          # fail when those optional files are absent.
          FILES=$(ls -1 \
            safeguard-mcp-linux-x64.tar.gz \
            safeguard-mcp-win-x64.zip \
            safeguard-mcp-darwin-arm64.tar.gz \
            sbom-linux-amd64.spdx.json \
            cosign.pub \
            2>/dev/null || true)
          # The three archives are mandatory; fail loudly if any is missing.
          for f in safeguard-mcp-linux-x64.tar.gz safeguard-mcp-win-x64.zip safeguard-mcp-darwin-arm64.tar.gz; do
            test -f "$f" || { echo "Required release archive missing: $f" >&2; exit 1; }
          done
          sha256sum $FILES | LC_ALL=C sort > SHA256SUMS
          cat SHA256SUMS
          # Self-check: verify the file we just produced is consistent.
          sha256sum -c SHA256SUMS
        displayName: 'Generate SHA256SUMS over release archives'

      - task: PublishPipelineArtifact@1
        displayName: 'Publish pipeline artifact'
        inputs:
          targetPath: $(Build.ArtifactStagingDirectory)/release
          artifactName: 'release'

      # GitHub Release
      - task: GitHubRelease@1
        displayName: 'Create GitHub Release'
        condition: startsWith(variables['Build.SourceBranch'], 'refs/tags/v')
        inputs:
          gitHubConnection: 'PangaeaBuild-GitHub'
          repositoryName: 'OneIdentity/safeguard-mcp'
          action: 'create'
          target: '$(Build.SourceVersion)'
          tagSource: 'userSpecifiedTag'
          tag: '$(ReleaseTag)'
          title: 'Safeguard MCP Server $(PackageVersion)'
          assets: |
            $(Build.ArtifactStagingDirectory)/release/safeguard-mcp-linux-x64.tar.gz
            $(Build.ArtifactStagingDirectory)/release/safeguard-mcp-win-x64.zip
            $(Build.ArtifactStagingDirectory)/release/safeguard-mcp-darwin-arm64.tar.gz
            $(Build.ArtifactStagingDirectory)/release/sbom-linux-amd64.spdx.json
            $(Build.ArtifactStagingDirectory)/release/cosign.pub
            $(Build.ArtifactStagingDirectory)/release/SHA256SUMS
          isPreRelease: $(IsPreRelease)
          addChangeLog: true
