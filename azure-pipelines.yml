trigger:
  branches:
    include:
      - main
  tags:
    include:
      - 'v*'

pr:
  branches:
    include:
      - main

variables:
  - template: pipeline-templates/global-variables.yml

jobs:
  # ──────────────────────────────────────────────────────────────
  # PR Validation: build + unit test only
  # ──────────────────────────────────────────────────────────────
  - job: PRValidation
    displayName: 'PR Validation'
    condition: eq(variables['Build.Reason'], 'PullRequest')
    pool:
      vmImage: 'ubuntu-latest'
    steps:
      - template: pipeline-templates/build-steps.yml

  # ──────────────────────────────────────────────────────────────
  # Per-RID AOT publish jobs (non-PR builds)
  # Native AOT cannot cross-compile across operating systems,
  # so each RID is built on its own pool.
  # ──────────────────────────────────────────────────────────────
  - job: Publish_linux_x64
    displayName: 'Publish linux-x64 (AOT)'
    condition: ne(variables['Build.Reason'], 'PullRequest')
    pool:
      vmImage: 'ubuntu-latest'
    steps:
      - script: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang zlib1g-dev
        displayName: 'Install Native AOT toolchain'

      - template: pipeline-templates/build-steps.yml

      - script: |
          dotnet publish src/SafeguardMcp/SafeguardMcp.csproj \
            -c Release -r linux-x64 -p:PublishAot=true \
            -o $(Build.ArtifactStagingDirectory)/linux-x64
        displayName: 'AOT publish linux-x64'

      - task: PublishPipelineArtifact@1
        displayName: 'Publish linux-x64 artifact'
        inputs:
          targetPath: $(Build.ArtifactStagingDirectory)/linux-x64
          artifactName: 'publish-linux-x64'

  # ──────────────────────────────────────────────────────────────
  # linux-arm64 AOT build runs on a Microsoft-hosted ARM64 Linux agent.
  # Native AOT cannot cross-compile across CPU architectures cleanly, so
  # we build natively on arm64. If the project does not have access to
  # the `ubuntu-22.04-arm` hosted pool, the documented fallback is to
  # build on `ubuntu-latest` (x64) with a cross-toolchain
  # (`gcc-aarch64-linux-gnu`, clang `--target` flags) -- see
  # DEVICE-CODE-AOT-PLAN.md §7a. Do not switch silently.
  # ──────────────────────────────────────────────────────────────
  - job: Publish_linux_arm64
    displayName: 'Publish linux-arm64 (AOT)'
    condition: ne(variables['Build.Reason'], 'PullRequest')
    pool:
      vmImage: 'ubuntu-22.04-arm'
    steps:
      - script: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang zlib1g-dev
        displayName: 'Install Native AOT toolchain'

      - template: pipeline-templates/build-steps.yml

      - script: |
          dotnet publish src/SafeguardMcp/SafeguardMcp.csproj \
            -c Release -r linux-arm64 -p:PublishAot=true \
            -o $(Build.ArtifactStagingDirectory)/linux-arm64
        displayName: 'AOT publish linux-arm64'

      - task: PublishPipelineArtifact@1
        displayName: 'Publish linux-arm64 artifact'
        inputs:
          targetPath: $(Build.ArtifactStagingDirectory)/linux-arm64
          artifactName: 'publish-linux-arm64'

  - job: Publish_win_x64
    displayName: 'Publish win-x64 (AOT)'
    condition: ne(variables['Build.Reason'], 'PullRequest')
    pool:
      vmImage: 'windows-latest'
    steps:
      - template: pipeline-templates/build-steps.yml

      - script: |
          dotnet publish src/SafeguardMcp/SafeguardMcp.csproj -c Release -r win-x64 -p:PublishAot=true -o $(Build.ArtifactStagingDirectory)/win-x64
        displayName: 'AOT publish win-x64'

      - task: PublishPipelineArtifact@1
        displayName: 'Publish win-x64 artifact'
        inputs:
          targetPath: $(Build.ArtifactStagingDirectory)/win-x64
          artifactName: 'publish-win-x64'

  - job: Publish_osx_arm64
    displayName: 'Publish osx-arm64 (AOT)'
    condition: ne(variables['Build.Reason'], 'PullRequest')
    pool:
      vmImage: 'macOS-latest'
    steps:
      - template: pipeline-templates/build-steps.yml

      - script: |
          dotnet publish src/SafeguardMcp/SafeguardMcp.csproj \
            -c Release -r osx-arm64 -p:PublishAot=true \
            -o $(Build.ArtifactStagingDirectory)/osx-arm64
        displayName: 'AOT publish osx-arm64'

      - task: PublishPipelineArtifact@1
        displayName: 'Publish osx-arm64 artifact'
        inputs:
          targetPath: $(Build.ArtifactStagingDirectory)/osx-arm64
          artifactName: 'publish-osx-arm64'

  # ──────────────────────────────────────────────────────────────
  # Release: aggregate artifacts, publish npm + Docker, GitHub release
  # ──────────────────────────────────────────────────────────────
  - job: Release
    displayName: 'Release'
    dependsOn:
      - Publish_linux_x64
      - Publish_linux_arm64
      - Publish_win_x64
      - Publish_osx_arm64
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    pool:
      vmImage: 'ubuntu-latest'
    steps:
      - checkout: self

      # Version stamping (sets $(PackageVersion), $(IsPreRelease), $(ReleaseTag))
      - task: PowerShell@2
        displayName: 'Set package version'
        inputs:
          filePath: 'pipeline-templates/versionnumber.ps1'
          arguments: >
            -BuildId $(Build.BuildId)
            -TagName $(Build.SourceBranchName)
            -IsTagBuild $(isTagBuild)
            -SemanticVersion $(semanticVersion)

      # Pull per-RID AOT publish outputs back into ArtifactStagingDirectory
      - task: DownloadPipelineArtifact@2
        displayName: 'Download linux-x64 artifact'
        inputs:
          artifact: 'publish-linux-x64'
          path: $(Build.ArtifactStagingDirectory)/linux-x64

      - task: DownloadPipelineArtifact@2
        displayName: 'Download linux-arm64 artifact'
        inputs:
          artifact: 'publish-linux-arm64'
          path: $(Build.ArtifactStagingDirectory)/linux-arm64

      - task: DownloadPipelineArtifact@2
        displayName: 'Download win-x64 artifact'
        inputs:
          artifact: 'publish-win-x64'
          path: $(Build.ArtifactStagingDirectory)/win-x64

      - task: DownloadPipelineArtifact@2
        displayName: 'Download osx-arm64 artifact'
        inputs:
          artifact: 'publish-osx-arm64'
          path: $(Build.ArtifactStagingDirectory)/osx-arm64

      # Restore executable bit (PublishPipelineArtifact does not preserve it)
      - script: |
          chmod +x $(Build.ArtifactStagingDirectory)/linux-x64/SafeguardMcp
          chmod +x $(Build.ArtifactStagingDirectory)/linux-arm64/SafeguardMcp
          chmod +x $(Build.ArtifactStagingDirectory)/osx-arm64/SafeguardMcp
        displayName: 'Restore executable bit on Linux/macOS binaries'

      # Stage binaries into npm platform packages
      - script: |
          cp $(Build.ArtifactStagingDirectory)/linux-x64/SafeguardMcp npm/safeguard-mcp-linux-x64/safeguard-mcp
          cp $(Build.ArtifactStagingDirectory)/linux-arm64/SafeguardMcp npm/safeguard-mcp-linux-arm64/safeguard-mcp
          cp $(Build.ArtifactStagingDirectory)/win-x64/SafeguardMcp.exe npm/safeguard-mcp-win-x64/safeguard-mcp.exe
          cp $(Build.ArtifactStagingDirectory)/osx-arm64/SafeguardMcp npm/safeguard-mcp-darwin-arm64/safeguard-mcp
          chmod +x npm/safeguard-mcp-linux-x64/safeguard-mcp
          chmod +x npm/safeguard-mcp-linux-arm64/safeguard-mcp
          chmod +x npm/safeguard-mcp-darwin-arm64/safeguard-mcp
        displayName: 'Stage binaries into npm packages'

      # Retrieve npm token from Key Vault
      - task: AzureKeyVault@2
        displayName: 'Get npm publish token'
        inputs:
          azureSubscription: 'SafeguardOpenSource'
          KeyVaultName: 'SafeguardBuildSecrets'
          SecretsFilter: 'NpmOrgApiKey'

      # Publish npm packages (release on tag, pre-release otherwise)
      - script: |
          npm config set //registry.npmjs.org/:_authToken=$(NpmOrgApiKey)

          # Publish platform packages first
          cd npm/safeguard-mcp-linux-x64 && npm publish --access public && cd ../..
          cd npm/safeguard-mcp-linux-arm64 && npm publish --access public && cd ../..
          cd npm/safeguard-mcp-win-x64 && npm publish --access public && cd ../..
          cd npm/safeguard-mcp-darwin-arm64 && npm publish --access public && cd ../..

          # Publish root package
          cd npm/safeguard-mcp && npm publish --access public && cd ../..
        displayName: 'npm publish (release)'
        condition: startsWith(variables['Build.SourceBranch'], 'refs/tags/v')

      - script: |
          npm config set //registry.npmjs.org/:_authToken=$(NpmOrgApiKey)

          # Publish platform packages first
          cd npm/safeguard-mcp-linux-x64 && npm publish --access public --tag pre && cd ../..
          cd npm/safeguard-mcp-linux-arm64 && npm publish --access public --tag pre && cd ../..
          cd npm/safeguard-mcp-win-x64 && npm publish --access public --tag pre && cd ../..
          cd npm/safeguard-mcp-darwin-arm64 && npm publish --access public --tag pre && cd ../..

          # Publish root package
          cd npm/safeguard-mcp && npm publish --access public --tag pre && cd ../..
        displayName: 'npm publish (pre-release)'
        condition: not(startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))

      # Build & push Docker image
      - task: AzureKeyVault@2
        displayName: 'Get GHCR token'
        inputs:
          azureSubscription: 'SafeguardOpenSource'
          KeyVaultName: 'SafeguardBuildSecrets'
          SecretsFilter: 'GitHubContainerRegistryToken'

      - script: |
          echo $(GitHubContainerRegistryToken) | docker login ghcr.io -u OneIdentity --password-stdin
          docker build -t $(containerRegistry)/$(imageName):$(PackageVersion) .
          docker push $(containerRegistry)/$(imageName):$(PackageVersion)
        displayName: 'Build & push Docker image'

      - script: |
          docker tag $(containerRegistry)/$(imageName):$(PackageVersion) $(containerRegistry)/$(imageName):latest
          docker push $(containerRegistry)/$(imageName):latest
        displayName: 'Tag & push :latest'
        condition: startsWith(variables['Build.SourceBranch'], 'refs/tags/v')

      # Stage release artifacts
      - task: CopyFiles@2
        displayName: 'Stage release artifacts'
        inputs:
          sourceFolder: $(Build.ArtifactStagingDirectory)
          contents: |
            linux-x64/SafeguardMcp
            linux-arm64/SafeguardMcp
            win-x64/SafeguardMcp.exe
            osx-arm64/SafeguardMcp
          targetFolder: $(Build.ArtifactStagingDirectory)/release

      - script: |
          cd $(Build.ArtifactStagingDirectory)
          tar -czf release/safeguard-mcp-linux-x64.tar.gz -C linux-x64 SafeguardMcp
          tar -czf release/safeguard-mcp-linux-arm64.tar.gz -C linux-arm64 SafeguardMcp
          zip -j release/safeguard-mcp-win-x64.zip win-x64/SafeguardMcp.exe
          tar -czf release/safeguard-mcp-darwin-arm64.tar.gz -C osx-arm64 SafeguardMcp
        displayName: 'Archive release binaries'

      - task: PublishPipelineArtifact@1
        displayName: 'Publish pipeline artifact'
        inputs:
          targetPath: $(Build.ArtifactStagingDirectory)/release
          artifactName: 'release'

      # GitHub Release
      - task: GitHubRelease@1
        displayName: 'Create GitHub Release'
        condition: startsWith(variables['Build.SourceBranch'], 'refs/tags/v')
        inputs:
          gitHubConnection: 'PangaeaBuild-GitHub'
          repositoryName: 'OneIdentity/safeguard-mcp'
          action: 'create'
          target: '$(Build.SourceVersion)'
          tagSource: 'userSpecifiedTag'
          tag: '$(ReleaseTag)'
          title: 'Safeguard MCP Server $(PackageVersion)'
          assets: |
            $(Build.ArtifactStagingDirectory)/release/safeguard-mcp-linux-x64.tar.gz
            $(Build.ArtifactStagingDirectory)/release/safeguard-mcp-linux-arm64.tar.gz
            $(Build.ArtifactStagingDirectory)/release/safeguard-mcp-win-x64.zip
            $(Build.ArtifactStagingDirectory)/release/safeguard-mcp-darwin-arm64.tar.gz
          isPreRelease: $(IsPreRelease)
          addChangeLog: true
