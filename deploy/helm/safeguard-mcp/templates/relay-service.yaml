apiVersion: v1
kind: Service
metadata:
  name: {{ include "safeguard-mcp.relayName" . }}
  labels:
    {{- include "safeguard-mcp.relayLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "safeguard-mcp.relaySelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
