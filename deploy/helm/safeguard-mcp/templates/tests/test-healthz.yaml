apiVersion: v1
kind: Pod
metadata:
  name: {{ include "safeguard-mcp.fullname" . }}-test-healthz
  labels:
    {{- include "safeguard-mcp.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: healthz
      image: curlimages/curl:8.10.1
      command: ["sh", "-c"]
      args:
        - |
          set -eu
          # The relay must serve /healthz on its ClusterIP.
          curl -sS -f -o /dev/null -w '%{http_code}\n' \
            "http://{{ include "safeguard-mcp.relayName" . }}/healthz" \
            | grep -qx '200'
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
