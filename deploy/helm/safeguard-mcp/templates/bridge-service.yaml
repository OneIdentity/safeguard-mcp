{{- if .Values.oauthBridge.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "safeguard-mcp.bridgeName" . }}
  labels:
    {{- include "safeguard-mcp.bridgeLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "safeguard-mcp.bridgeSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
{{- end }}
