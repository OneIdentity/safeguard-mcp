# Source: safeguard-mcp/templates/bridge-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: safeguard-mcp-bridge
  labels:
    helm.sh/chart: safeguard-mcp-0.1.0
    app.kubernetes.io/name: safeguard-mcp
    app.kubernetes.io/instance: safeguard-mcp
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: bridge
spec:
  replicas: 1
  strategy:
    # Single-replica: Recreate so we never run two bridge pods
    # simultaneously, even transiently during rollout. The bridge
    # holds in-flight OAuth state in process memory.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: safeguard-mcp
      app.kubernetes.io/instance: safeguard-mcp
      app.kubernetes.io/component: bridge
  template:
    metadata:
      labels:
        helm.sh/chart: safeguard-mcp-0.1.0
        app.kubernetes.io/name: safeguard-mcp
        app.kubernetes.io/instance: safeguard-mcp
        app.kubernetes.io/version: "0.1.0"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: bridge
      annotations:
        checksum/config: 3ada7c2313b1e6d2eb648da60a1c83783920e803724c704b4089c2f65ae926d2
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: safeguard-mcp
          image: ghcr.io/oneidentity/safeguard-mcp:0.1.0
          imagePullPolicy: IfNotPresent
          args: ["--http"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: safeguard-mcp-config
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
          # Lenient liveness — restart on a real lockup, not a slow
          # rSTS round-trip. Restart invalidates in-flight /authorize
          # and unredeemed /token entries; users restart their login.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
