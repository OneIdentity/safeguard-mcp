# Source: safeguard-mcp/templates/tests/test-healthz.yaml
apiVersion: v1
kind: Pod
metadata:
  name: safeguard-mcp-test-healthz
  labels:
    helm.sh/chart: safeguard-mcp-0.1.0
    app.kubernetes.io/name: safeguard-mcp
    app.kubernetes.io/instance: safeguard-mcp
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: healthz
      image: curlimages/curl:8.10.1
      command: ["sh", "-c"]
      args:
        - |
          set -eu
          # The relay must serve /healthz on its ClusterIP.
          curl -sS -f -o /dev/null -w '%{http_code}\n' \
            "http://safeguard-mcp-relay/healthz" \
            | grep -qx '200'
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
---
# Source: safeguard-mcp/templates/tests/test-wellknown.yaml
apiVersion: v1
kind: Pod
metadata:
  name: safeguard-mcp-test-wellknown
  labels:
    helm.sh/chart: safeguard-mcp-0.1.0
    app.kubernetes.io/name: safeguard-mcp
    app.kubernetes.io/instance: safeguard-mcp
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: wellknown
      image: curlimages/curl:8.10.1
      command: ["sh", "-c"]
      args:
        - |
          set -eu
          # Bridge enabled: well-known metadata documents must be
          # served by the relay (the bridge fan-out is via Ingress
          # path-routing; in-cluster we hit the relay Service
          # directly).
          for path in /.well-known/oauth-protected-resource \
                      /.well-known/oauth-authorization-server; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' \
              "http://safeguard-mcp-relay${path}")
            if [ "$code" != "200" ]; then
              echo "FAIL: ${path} returned ${code}" >&2
              exit 1
            fi
          done
          echo "well-known metadata served"
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
