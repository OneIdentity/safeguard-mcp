# Source: safeguard-mcp/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: safeguard-mcp
  labels:
    helm.sh/chart: safeguard-mcp-0.1.0
    app.kubernetes.io/name: safeguard-mcp
    app.kubernetes.io/instance: safeguard-mcp
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - "mcp.example.com"
      secretName: "safeguard-mcp-tls"
  rules:
    - host: "mcp.example.com"
      http:
        paths:
          - path: /authorize
            pathType: Prefix
            backend:
              service:
                name: safeguard-mcp-bridge
                port:
                  name: http
          - path: /token
            pathType: Exact
            backend:
              service:
                name: safeguard-mcp-bridge
                port:
                  name: http
          - path: /register
            pathType: Exact
            backend:
              service:
                name: safeguard-mcp-bridge
                port:
                  name: http
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: safeguard-mcp-relay
                port:
                  name: http
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: safeguard-mcp-relay
                port:
                  name: http
          - path: /.well-known/
            pathType: Prefix
            backend:
              service:
                name: safeguard-mcp-relay
                port:
                  name: http
