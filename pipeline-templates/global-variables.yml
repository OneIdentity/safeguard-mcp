variables:
  - name: semanticVersion
    value: '0.2.0'
  - name: isTagBuild
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/tags/') }}
  # Gate for code-signing and other steps that need access to release
  # secrets (Authenticode certs, Apple cert, PGP key, cosign key, etc.).
  # True only for non-PR builds on `main` or a `refs/tags/v*` tag, so PRs
  # (including from forks) can never pull SPPCodeSigning vault secrets.
  - name: isRelease
    value: $[ and(
        ne(variables['Build.Reason'], 'PullRequest'),
        or(
          eq(variables['Build.SourceBranch'], 'refs/heads/main'),
          startsWith(variables['Build.SourceBranch'], 'refs/tags/v')
        )
      ) ]
  - name: dotnetVersion
    value: '10.0.x'
  - name: containerRegistry
    value: 'docker.io/oneidentity'
  - name: imageName
    value: 'safeguard-mcp'
  # Quiet Node-based pipeline tasks (AzureKeyVault@2, npm). Hosted agents
  # are IPv4-only, but Azure/npm endpoints publish AAAA records, so Node's
  # dual-stack connect logs IPv6 ENETUNREACH noise; ipv4first makes Node
  # prefer IPv4 and skip the IPv6 leg. --no-deprecation suppresses the
  # tasks' DEP0169 url.parse deprecation warning. ADO exposes this variable
  # as an env var to every step's Node process.
  - name: NODE_OPTIONS
    value: '--dns-result-order=ipv4first --no-deprecation'
