# Dependabot configuration for safeguard-mcp.
#
# Covers every package manifest the repo ships:
#   - NuGet (the .NET project under src/)
#   - npm root + per-platform packages under npm/
#   - Docker (Dockerfile)
#
# All ecosystems run weekly and group minor + patch updates into a single PR
# per ecosystem to keep review noise down. Major-version updates remain
# individual PRs so they get explicit attention.
#
# When a new platform npm package is added it must also get its own entry
# below, or the version-stamp drift guard will eventually catch the mismatch.
version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      nuget-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/npm/safeguard-mcp"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm-root-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/npm/safeguard-mcp-linux-x64"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-linux-x64-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/npm/safeguard-mcp-win-x64"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-win-x64-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/npm/safeguard-mcp-darwin-arm64"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-darwin-arm64-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      docker-minor-patch:
        update-types:
          - minor
          - patch
